<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0d0d0d;
            --surface:   #161616;
            --border:    #2a2a2a;
            --accent:    #c8a96e;
            --accent2:   #e8c98e;
            --text:      #f0ece4;
            --muted:     #888;
            --error:     #e05252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(200,169,110,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(200,169,110,0.04) 0%, transparent 50%);
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .logo p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin-bottom: 28px;
            color: var(--text);
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .field input::placeholder {
            color: #444;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0d0d0d;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover { background: var(--accent2); }
        .btn:active { transform: scale(0.98); }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            min-height: 20px;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo">
            <h1>♪ Melodia</h1>
            <p>Music Subscription</p>
        </div>

        <div class="card">
            <h2>Welcome back</h2>

            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn" id="login-btn" onclick="login()">Sign In</button>

            <p class="error-msg" id="error-msg"></p>
        </div>

        <div class="footer-link">
            New here? <a href="register.html">Create an account</a>
        </div>
    </div>

    <script>
        // ─── CONFIG ──────────────────────────────────────────────────────────────────
        // Change this to your backend URL:
        // EC2:    'http://<ec2-public-ip>'
        // ECS:    'http://<ecs-public-ip>'
        // Lambda: 'https://<api-gateway-id>.execute-api.us-east-1.amazonaws.com/Prod'
        const API = 'https://yi1gcj6o9e.execute-api.us-east-1.amazonaws.com/Prod';

        // ─── LOGIN ───────────────────────────────────────────────────────────────────
        async function login() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl  = document.getElementById('error-msg');
            const btn      = document.getElementById('login-btn');

            errorEl.textContent = '';

            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    // Backend returns user info inside data.data
                    sessionStorage.setItem('email', email);
                    sessionStorage.setItem('user_name', data.data.user_name);
                    window.location.href = 'main.html';
                } else {
                    // Show the exact error message from backend
                    errorEl.textContent = data.message || 'email or password is invalid';
                }

            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        // If already logged in redirect to main
        if (sessionStorage.getItem('email')) {
            window.location.href = 'main.html';
        }
    </script>
</body>
</html>
