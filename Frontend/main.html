<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0d0d;
            --surface:  #161616;
            --surface2: #1e1e1e;
            --border:   #2a2a2a;
            --accent:   #c8a96e;
            --accent2:  #e8c98e;
            --text:     #f0ece4;
            --muted:    #888;
            --error:    #e05252;
            --success:  #52c97a;
            --remove:   #c0392b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .welcome-text {
            font-size: 13px;
            color: var(--muted);
        }

        .welcome-text span {
            color: var(--text);
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 16px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── LAYOUT ── */
        .layout {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 24px;
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: auto 1fr;
            gap: 24px;
        }

        /* ── PANELS ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* Query panel spans full width */
        .query-panel {
            grid-column: 1 / -1;
        }

        /* ── QUERY FORM ── */
        .query-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus { border-color: var(--accent); }
        .input-group input::placeholder { color: #444; }

        .query-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-search {
            padding: 10px 28px;
            background: var(--accent);
            color: #0d0d0d;
            border: none;
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-search:hover { background: var(--accent2); }
        .btn-search:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-clear {
            padding: 10px 18px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        .query-error {
            color: var(--error);
            font-size: 13px;
            margin-left: 4px;
        }

        /* ── SONG CARDS ── */
        #query-results, #subscription-list {
            margin-top: 16px;
        }

        .song-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            background: var(--surface2);
            transition: border-color 0.2s;
        }

        .song-card:hover { border-color: #3a3a3a; }

        .song-card img {
            width: 52px;
            height: 52px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }

        .song-info { flex: 1; min-width: 0; }

        .song-title {
            font-weight: 500;
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-meta {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-btn {
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }

        .card-btn:active { transform: scale(0.96); }

        .btn-subscribe {
            background: var(--success);
            color: #0d0d0d;
        }

        .btn-subscribe:hover { opacity: 0.85; }

        .btn-remove {
            background: var(--remove);
            color: white;
        }

        .btn-remove:hover { opacity: 0.85; }

        /* ── STATES ── */
        .empty-state, .no-result {
            text-align: center;
            padding: 30px 0;
            color: var(--muted);
            font-size: 14px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 20px 0;
            color: var(--muted);
            font-size: 13px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESULTS GRID (for query) ── */
        #query-results .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 10px;
        }

        /* ── SUBSCRIPTIONS LIST (sidebar style) ── */
        .subscription-panel {
            grid-row: 1 / 3;
            align-self: start;
            position: sticky;
            top: 84px;
            max-height: calc(100vh - 110px);
            display: flex;
            flex-direction: column;
        }

        .subscription-panel .panel {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .subscription-panel {
                grid-row: auto;
                position: static;
                max-height: none;
            }

            .query-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 560px) {
            .query-grid { grid-template-columns: 1fr; }
            .header { padding: 0 16px; }
        }
    </style>
</head>
<body>

    <!-- ── HEADER / USER AREA ───────────────────────────────────────── -->
    <header class="header">
        <div class="header-logo">♪ Melodia</div>
        <div class="header-right">
            <span class="welcome-text">
                Welcome, <span id="username-display">...</span>
            </span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="layout">

        <!-- ── SUBSCRIPTION AREA ──────────────────────────────────────── -->
        <div class="subscription-panel">
            <div class="panel">
                <div class="panel-title">My Subscriptions</div>
                <div id="subscription-list">
                    <p class="loading">Loading</p>
                </div>
            </div>
        </div>

        <!-- ── QUERY AREA ─────────────────────────────────────────────── -->
        <div class="panel query-panel">
            <div class="panel-title">Search Music</div>

            <div class="query-grid">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="q-title" placeholder="e.g. Love Story">
                </div>
                <div class="input-group">
                    <label>Artist</label>
                    <input type="text" id="q-artist" placeholder="e.g. Taylor Swift">
                </div>
                <div class="input-group">
                    <label>Year</label>
                    <input type="text" id="q-year" placeholder="e.g. 2012">
                </div>
                <div class="input-group">
                    <label>Album</label>
                    <input type="text" id="q-album" placeholder="e.g. Fearless">
                </div>
            </div>

            <div class="query-actions">
                <button class="btn-search" id="search-btn" onclick="queryMusic()">Search</button>
                <button class="btn-clear" onclick="clearSearch()">Clear</button>
                <span class="query-error" id="query-error"></span>
            </div>

            <div id="query-results"></div>
        </div>

    </div>

    <script>
        // ─── CONFIG ──────────────────────────────────────────────────────────────────
        // Change this to your backend URL:
        // EC2:    'http://<ec2-public-ip>'
        // ECS:    'http://<ecs-public-ip>'
        // Lambda: 'https://<api-gateway-id>.execute-api.us-east-1.amazonaws.com/Prod'
        const API = 'https://yi1gcj6o9e.execute-api.us-east-1.amazonaws.com/Prod';

        // ─── SESSION CHECK ───────────────────────────────────────────────────────────
        const email     = sessionStorage.getItem('email');
        const user_name = sessionStorage.getItem('user_name');

        // Redirect to login if not logged in
        if (!email || !user_name) {
            window.location.href = 'index.html';
        }

        document.getElementById('username-display').textContent = user_name;

        // ─── SUBSCRIPTIONS ───────────────────────────────────────────────────────────

        async function loadSubscriptions() {
            const container = document.getElementById('subscription-list');
            container.innerHTML = '<p class="loading">Loading</p>';

            try {
                // Backend endpoint: GET /subscriptions?email=...
                const res = await fetch(
                    `${API}/subscriptions?email=${encodeURIComponent(email)}`
                );
                const data = await res.json();

                // Backend returns { success: true, results: [...] }
                const subs = data.results || [];

                if (subs.length === 0) {
                    container.innerHTML =
                        '<p class="empty-state">No subscriptions yet.<br>Search for music to get started.</p>';
                    return;
                }

                container.innerHTML = '';
                subs.forEach(song => {
                    container.appendChild(buildCard(song, 'remove'));
                });

            } catch (err) {
                container.innerHTML =
                    '<p class="empty-state" style="color:var(--error)">Failed to load subscriptions.</p>';
            }
        }

        async function removeSub(title) {
            try {
                // Backend endpoint: DELETE /subscriptions
                // Body: { email, title }
                const res = await fetch(`${API}/subscriptions`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, title })
                });
                const data = await res.json();
                if (data.success) {
                    loadSubscriptions(); // Refresh the list
                }
            } catch (err) {
                alert('Failed to remove subscription.');
            }
        }

        // ─── QUERY MUSIC ─────────────────────────────────────────────────────────────

        async function queryMusic() {
            const title   = document.getElementById('q-title').value.trim();
            const artist  = document.getElementById('q-artist').value.trim();
            const year    = document.getElementById('q-year').value.trim();
            const album   = document.getElementById('q-album').value.trim();
            const errorEl = document.getElementById('query-error');
            const results = document.getElementById('query-results');
            const btn     = document.getElementById('search-btn');

            errorEl.textContent = '';

            // At least one field must be filled
            if (!title && !artist && !year && !album) {
                errorEl.textContent = 'Please enter at least one field.';
                return;
            }

            btn.disabled = true;
            results.innerHTML = '<p class="loading">Searching</p>';

            try {
                // Backend endpoint: GET /music/query?title=&artist=&year=&album=
                const params = new URLSearchParams();
                if (title)  params.append('title',  title);
                if (artist) params.append('artist', artist);
                if (year)   params.append('year',   year);
                if (album)  params.append('album',  album);

                const res  = await fetch(`${API}/music/query?${params}`);
                const data = await res.json();

                // Backend returns { success: true, results: [...] }
                const songs = data.results || [];

                results.innerHTML = '';

                if (songs.length === 0) {
                    results.innerHTML =
                        '<p class="no-result">No result is retrieved. Please query again</p>';
                    return;
                }

                // Wrap in a grid container
                const grid = document.createElement('div');
                grid.className = 'results-grid';
                songs.forEach(song => grid.appendChild(buildCard(song, 'subscribe')));
                results.appendChild(grid);

            } catch (err) {
                results.innerHTML =
                    '<p class="no-result" style="color:var(--error)">Search failed. Please try again.</p>';
            } finally {
                btn.disabled = false;
            }
        }

        async function subscribe(song) {
            try {
                // Backend endpoint: POST /subscriptions
                // Body: { email, song: { title, artist, year, album, img_url } }
                const res = await fetch(`${API}/subscriptions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        song: {
                            title:   song.title,
                            artist:  song.artist,
                            year:    song.year,
                            album:   song.album,
                            img_url: song.img_url || ''
                        }
                    })
                });
                const data = await res.json();
                if (data.success) {
                    loadSubscriptions(); // Refresh subscription list
                } else {
                    alert(data.message || 'Already subscribed.');
                }
            } catch (err) {
                alert('Failed to subscribe.');
            }
        }

        // ─── HELPERS ─────────────────────────────────────────────────────────────────

        // Build a song card DOM element
        // type: 'subscribe' = shows Subscribe button (for query results)
        //       'remove'    = shows Remove button (for subscriptions)
        function buildCard(song, type) {
            const card = document.createElement('div');
            card.className = 'song-card';

            // Image — use img_url directly from the song
            // The backend/S3 team should provide accessible URLs
            const imgSrc = song.img_url || song.presigned_url || '';

            // Safely encode song data for the onclick attribute
            const songData = JSON.stringify(song)
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");

            card.innerHTML = `
                <img
                    src="${escapeHtml(imgSrc)}"
                    alt="${escapeHtml(song.artist || '')}"
                    onerror="this.src='';this.style.background='#2a2a2a'">
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.title || '')}</div>
                    <div class="song-meta">
                        ${escapeHtml(song.artist || '')}
                        &nbsp;·&nbsp;${escapeHtml(song.album || '')}
                        &nbsp;·&nbsp;${escapeHtml(String(song.year || ''))}
                    </div>
                </div>
                ${type === 'subscribe'
                    ? `<button class="card-btn btn-subscribe"
                            onclick='subscribeFromCard(${JSON.stringify(song)})'>
                            Subscribe
                       </button>`
                    : `<button class="card-btn btn-remove"
                            onclick="removeSub('${escapeAttr(song.title)}')">
                            Remove
                       </button>`
                }
            `;
            return card;
        }

        // Called from the Subscribe button — passes the full song object
        function subscribeFromCard(song) {
            subscribe(song);
        }

        function clearSearch() {
            document.getElementById('q-title').value  = '';
            document.getElementById('q-artist').value = '';
            document.getElementById('q-year').value   = '';
            document.getElementById('q-album').value  = '';
            document.getElementById('query-error').textContent = '';
            document.getElementById('query-results').innerHTML = '';
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Prevent XSS in HTML content
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Prevent XSS in attribute values
        function escapeAttr(str) {
            if (!str) return '';
            return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        }

        // Allow Enter key to trigger search
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' &&
                document.activeElement.closest('.query-panel')) {
                queryMusic();
            }
        });

        // ─── INIT ─────────────────────────────────────────────────────────────────
        loadSubscriptions();
    </script>

</body>
</html>
